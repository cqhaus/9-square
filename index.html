<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아홉 · 9_Square — 9줄 바둑</title>
<meta name="theme-color" content="#1c2622">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="9_Square">
<style>
  :root {
    --bg: #1c2622;
    --bg-soft: #26332e;
    --line: #4a3315;
    --ink: #efe9dc;
    --ink-dim: #9aa79f;
    --accent: #3fa66b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
    min-height: 100dvh;
  }

  header {
    width: 100%;
    max-width: 460px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 4px 12px;
    position: relative;
  }
  #logoSpin {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 21px; height: 21px;
    margin: -10.5px 0 0 -10.5px;
    animation: spinC 5s linear infinite;
  }
  @keyframes spinC { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { #logoSpin { animation: none; } }
  header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.06em; margin-left: 1ch; }
  .taegeuk { width: 21px; height: 21px; display: block; animation: spin 5s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .taegeuk { animation: none; } }
  .brand-en { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: 0.04em; }
  .brand-right { margin-right: 1ch; display: flex; align-items: center; gap: 10px; }
  .top-spacer { height: 8vh; flex-shrink: 0; }
  .center-info { text-align: center; flex: 1; }
  .user-id { font-size: 16px; font-weight: 800; color: var(--ink); }
  .user-rank { font-size: 13px; color: var(--ink-dim); margin-top: 2px; font-weight: 700; }
  #userRank.win { color: #35d07f; font-weight: 700; }
  .id-input {
    width: 100%; box-sizing: border-box; margin-top: 4px;
    padding: 10px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--ink); font-size: 15px; font-weight: 600; text-align: center;
  }
  .brand-right { display: flex; align-items: center; gap: 10px; }
  #logoHome, #logoSpin { cursor: pointer; }
  .gear {
    background: none; border: none; padding: 4px; margin: 0;
    color: var(--ink-dim); cursor: pointer; display: flex; align-items: center;
    transition: color 0.2s, transform 0.3s;
  }
  .gear:hover { color: var(--accent); transform: rotate(45deg); }
  .hintDot { animation: hintBlink 1.1s ease-in-out infinite; pointer-events: none; }
  .hintBest { animation: hintBlinkBest 1.1s ease-in-out infinite; }
  @keyframes hintBlink { 0%,100% { opacity: 0.15; } 50% { opacity: 0.5; } }
  @keyframes hintBlinkBest { 0%,100% { opacity: 0.45; } 50% { opacity: 0.95; } }
  @media (prefers-reduced-motion: reduce) { .hintDot, .hintBest { animation: none; } }

  .status {
    width: 100%;
    max-width: 460px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: var(--bg-soft);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .player { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .player.white { justify-content: flex-end; }
  .dot {
    width: 18px; height: 18px; border-radius: 50%; flex: none;
    transition: box-shadow 0.25s ease;
  }
  .dot.black { background: radial-gradient(circle at 35% 30%, #4d4d4d, #111 70%); }
  .dot.white { background: radial-gradient(circle at 35% 30%, #ffffff, #d8d4c8 75%); border: 1px solid #b9b4a5; }
  .player.turn .dot { box-shadow: 0 0 0 3px var(--accent); }
  .captures { font-size: 12px; color: var(--ink-dim); }
  .turn-label { font-size: 13px; color: var(--ink-dim); text-align: center; padding: 0 10px; white-space: nowrap; }
  .turn-label b { color: var(--ink); }

  .board-wrap {
    width: 100%;
    max-width: 460px;
    aspect-ratio: 460 / 492;
    position: relative;
  }
  svg {
    width: 100%; height: 100%; display: block;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  }

  .stone.dead { opacity: 0.35; }

  .controls {
    width: 100%;
    max-width: 460px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  #playControls { grid-template-columns: 1fr 1fr 1fr; }
  /* 판 놓아보기 3분할 바 */
  .setup-bar {
    width: 100%; max-width: 460px; margin-top: 8px;
    display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 8px;
  }
  .sb-stone {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 9px 0; border-radius: 10px; cursor: pointer;
    background: var(--bg-soft); border: 2px solid rgba(255,255,255,0.08);
    color: var(--ink); font-size: 14px; font-weight: 700;
    opacity: 0.4;                      /* 평소엔 흐리게(비활성 느낌) */
    transition: opacity 0.15s, border-color 0.15s, background 0.15s;
  }
  .setup-bar.placing .sb-stone { opacity: 1; }   /* 배치 중엔 또렷하게 */
  .sb-stone.sel { border-color: var(--accent); background: rgba(63,166,107,0.15); opacity: 1; }
  .sb-mid {
    padding: 9px 0; border-radius: 10px; cursor: pointer;
    background: var(--bg-soft); border: 1px solid rgba(255,255,255,0.08);
    color: var(--ink); font-size: 14px; font-weight: 700;
  }
  .setup-bar.placing .sb-mid { background: var(--accent); border-color: transparent; }
  .pal-txt { font-size: 13px; }
  .pstone { width: 24px; height: 24px; border-radius: 50%; display: block; }
  .pstone.black { background: radial-gradient(circle at 35% 30%, #555, #111 70%); }
  .pstone.white { background: radial-gradient(circle at 35% 30%, #fff, #cfcabd 75%); }
  /* Rank Record 줄 */
  .rank-record {
    width: 100%; max-width: 460px; margin-top: 8px;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--bg-soft); border: 1px solid rgba(255,255,255,0.06);
  }
  .rr-label { font-size: 12px; color: var(--ink-dim); font-weight: 700; white-space: nowrap; }
  .rr-list { font-size: 14px; font-weight: 700; letter-spacing: 0.01em; color: var(--ink); line-height: 1.5; }
  .rr-win { color: #35d07f; }   /* 이긴 기록은 초록 */
  button {
    font: inherit; font-size: 14px; font-weight: 700;
    color: var(--ink);
    background: var(--bg-soft);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 0;
    cursor: pointer;
    transition: transform 0.05s ease, background 0.15s ease;
  }
  button:active { transform: scale(0.96); background: #31413a; }
  button.primary { background: var(--accent); border-color: transparent; }
  button.primary:active { background: #2f7d50; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .hidden { display: none !important; }

  .toast {
    position: fixed; left: 50%; bottom: 100px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.85);
    color: var(--ink); font-size: 14px;
    padding: 10px 18px; border-radius: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .result-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .result-card {
    background: var(--bg-soft);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 26px 24px 20px;
    width: 100%; max-width: 340px;
    text-align: center;
  }
  .result-card h2 { font-size: 22px; margin-bottom: 4px; }
  .result-card h2 span { color: var(--accent); }
  .result-card .detail { font-size: 14px; color: var(--ink-dim); line-height: 1.7; margin: 12px 0 18px; }
  .result-card .detail b { color: var(--ink); }
  .result-card .btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .result-card .btns button { font-size: 13px; padding: 11px 0; }
  /* ---------- 대국 설정 화면 ---------- */
  .opt-label { font-size: 12px; color: var(--ink-dim); margin: 14px 0 6px; letter-spacing: 0.06em; }
  .opt-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .opt {
    padding: 10px 14px; font-size: 14px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
  }
  .opt.sel { background: var(--accent); border-color: transparent; }
  .setup-start { margin-top: 20px; width: 100%; }
  .opt-hint { font-size: 11px; color: var(--ink-dim); margin-top: 8px; line-height: 1.5; }
  .stepper { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .step { width: 44px; height: 44px; border-radius: 12px; font-size: 22px; font-weight: 700; background: rgba(255,255,255,0.06); }
  .stepval { min-width: 72px; text-align: center; font-size: 18px; font-weight: 700; }
</style>
</head>
<body>

<div class="top-spacer"></div>

<header>
  <h1 id="logoHome" title="바둑판으로">아홉줄 바둑</h1>
  <svg class="taegeuk" id="logoSpin" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="48" fill="#f2f0ea"/>
    <path d="M50 2 a48 48 0 0 1 0 96 a24 24 0 0 1 0 -48 a24 24 0 0 0 0 -48 z" fill="#1b1b1b"/>
    <circle cx="50" cy="26" r="8" fill="#f2f0ea"/>
    <circle cx="50" cy="74" r="8" fill="#1b1b1b"/>
    <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  </svg>
  <div class="brand-right">
    <div class="brand-en">9_Square</div>
    <button id="btnSettings" class="gear" title="새 대국 설정" aria-label="설정">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>

</header>

<div class="status">
  <div class="player black" id="pBlack">
    <div class="dot black"></div>
    <div>
      <div id="nameBlack">흑</div>

  <div class="player white" id="pWhite">

      <div id="nameWhite" style="text-align:right">백</div>

<div class="board-wrap">

<div class="controls" id="playControls">
  <button id="btnUndo" title="한 수 무르기">&lt;=</button>
  <button id="btnRedo" title="한 수 앞으로">=&gt;</button>
  <button id="btnHint">힌트</button>
  <button id="btnScoreReq" class="primary">계가</button>

  <button id="btnScoreDone" class="primary">계가 완료</button>
</div>

<div class="toast" id="toast"></div>
<div id="resultOverlay" class="hidden"></div>
<div id="setupOverlay" class="hidden"></div>

<script>
/* ============================================================
   9줄 바둑 v5
   변경점: 죽은 돌 자동 판정을 몬테카를로 방식으로 교체.

   원리:
   지금 판에서 양쪽이 무작위로(단, 자기 눈은 채우지 않고)
   수백 판을 끝까지 마저 둬본다. 죽은 돌은 그 과정에서
   거의 항상 잡혀 나가고, 두 눈을 가진 돌은 거의 항상
   살아남는다. 각 그룹의 '생존율'을 계산해서 50% 미만이면
   죽은 돌로 판정한다. 초창기 바둑 AI들이 실제로 쓰던
   계가 방법이다.
   ============================================================ */

const SIZE = 9;
const MARGIN = 38;
const SPACING_X = 48;
const SPACING_Y = 52;
let KOMI = 6.5;              // 덤 (설정에서 바꿈)
let handicap = 0;           // 치수 (접바둑 돌 수, 0=호선)
const PLAYOUTS = 300;     // 무작위 마무리 판 수 (판정 정확도와 속도의 균형)
const EMPTY = 0, BLACK = 1, WHITE = 2;

const svg = document.getElementById('board');
const NS = 'http://www.w3.org/2000/svg';

let board, turn, captures, history, positions, passCount, lastMove;

// ---- KataGo 서버 연동 ----
// 노트북 Tailscale 주소. 서버(katago_server.py)가 여기서 대기 중이어야 함.
const KATAGO_SERVER = 'http://100.127.148.65:8000';
let gtpMoves = [];        // 서버에 보낼 착수 기록 [["b","E5"],["w","C3"],...]
let redoStack = [];       // 무르기로 되돌린 수들 (=> 로 다시 진행)
let hintMarks = [];       // 현재 표시된 힌트 점들
const GTP_COLS = 'ABCDEFGHJKLMNOPQRST';   // I 없음
function toGtp(x, y) { return GTP_COLS[x] + (SIZE - y); }
function fromGtp(s) {
  const col = GTP_COLS.indexOf(s[0].toUpperCase());
  const row = parseInt(s.slice(1), 10);
  return { x: col, y: SIZE - row };
}

// ---------- 힌트 (KataGo 추천 수 표시) ----------
let hintLoading = false;
let hintUsedThisGame = false;   // 이번 대국에서 힌트를 썼는지 (Rank 제외용)
function clearHint() {
  if (hintMarks.length) { hintMarks = []; if (typeof renderStones === 'function') renderStones(); }
}
function toggleHint() {
  // 이미 켜져 있으면 끈다
  if (hintMarks.length) { clearHint(); return; }
  if (hintLoading) return;
  if (gameOver) { showToast('대국이 끝났습니다'); return; }
  requestHint();
}
async function requestHint() {
  hintLoading = true;
  showToast('KataGo에게 추천 수를 묻는 중…', 2500);
  try {
    const color = turn === BLACK ? 'b' : 'w';
    const res = await fetch(KATAGO_SERVER + '/hint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ moves: gtpMoves, color, boardsize: SIZE, komi: KOMI, top: 5 }),
    });
    if (!res.ok) throw new Error('서버 오류 ' + res.status);
    const data = await res.json();
    const cands = data.candidates || [];
    if (!cands.length) { showToast('추천 수를 찾지 못했습니다'); return; }
    hintMarks = cands.map(c => {
      const p = fromGtp(c.move);
      return { x: p.x, y: p.y, best: c.order === 0 };
    }).filter(h => h.x >= 0 && h.x < SIZE && h.y >= 0 && h.y < SIZE);
    hintUsedThisGame = true;     // 이번 대국에서 힌트 사용함 → Rank(최고성적) 제외
    renderStones();
  } catch (e) {
    showToast('AI 서버에 연결할 수 없습니다');
  } finally {
    hintLoading = false;
  }
}

// 지금까지의 대국 기록을 진단용 텍스트로 만들어 클립보드에 복사
function copyGameRecord() {
  const record = {
    보드크기: SIZE,
    덤: KOMI,
    치수: handicap,
    내돌: (aiColor === BLACK ? '백' : '흑'),
    착수기록: gtpMoves,
  };
  const text = '=== 아홉 9_Square 대국 기록 ===\n'
    + JSON.stringify(record, null, 2)
    + '\n=== 기록 끝 ===';
  // 클립보드 복사 (실패 시 화면에 표시해서 수동 복사 가능하게)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => showToast('대국 기록이 복사되었습니다. Claude에게 붙여넣으세요', 3000),
      () => showRecordFallback(text)
    );
  } else {
    showRecordFallback(text);
  }
}

// 클립보드가 안 될 때: 화면에 텍스트를 띄워 길게 눌러 복사
function showRecordFallback(text) {
  const overlay = document.getElementById('resultOverlay');
  overlay.className = 'result-overlay';
  overlay.innerHTML = '<div class="result-card">'
    + '<h2>대국 <span>기록</span></h2>'
    + '<div class="detail">아래 내용을 길게 눌러 전체 선택·복사하세요.</div>'
    + '<textarea readonly style="width:100%;height:160px;font-size:11px;'
    + 'background:rgba(0,0,0,0.3);color:var(--ink);border:1px solid rgba(255,255,255,0.15);'
    + 'border-radius:8px;padding:8px;box-sizing:border-box">'
    + text.replace(/</g, '&lt;') + '</textarea>'
    + '<button class="primary setup-start" id="btnRecClose">닫기</button></div>';
  const ta = overlay.querySelector('textarea');
  ta.focus(); ta.select();
  document.getElementById('btnRecClose').addEventListener('click', () => {
    overlay.className = 'hidden'; overlay.innerHTML = '';
  });
}
let gameOver;
let fixing;
let deadStones;
let territoryMarks;
let gameMode = 'ai';      // 'pvp'(둘이서) | 'ai'(AI 대국)
let aiColor = WHITE;      // AI가 잡은 돌 색
let aiLevel = 1;          // 0 순한 상대, 1 보통, 2 센 상대
let aiThinking = false;   // AI가 수를 읽는 중
let aiActing = false;     // AI가 착수/패스를 실행하는 순간
let aiLowStreak = 0;      // AI 승률이 바닥인 연속 횟수 (불계 판단용)

function px(i) { return MARGIN + i * SPACING_X; }
function py(i) { return MARGIN + i * SPACING_Y; }

function onTap(x, y) {
  if (setupMode) { setupPlace(x, y); return; }
  if (setupReady) { showToast('흑돌/백돌을 눌러 대국을 시작하세요'); return; }
  if (fixing) { toggleDead(x, y); return; }
  if (aiThinking) return;                                        // AI가 읽는 중
  if (gameMode === 'ai' && turn === aiColor && !gameOver) return; // AI 차례
  tryMove(x, y);
}

let setupMode = false;
let setupReady = false;   // 배치를 마치고 흑/백 선택 대기 상태
let setupColor = BLACK;   // 지금 놓을 돌 색

// 초기 화면(첫 접속 상태)으로 완전 복귀: 기본 AI 대국, 내가 흑
function goHome() {
  setupMode = false;
  setupReady = false;
  const sb = document.getElementById('setupBar');
  if (sb) sb.classList.remove('placing');
  const bsm = document.getElementById('btnSetupMode');
  if (bsm) bsm.textContent = '판 놓아보기';
  gameMode = 'ai';
  aiColor = WHITE;      // 내가 흑, AI가 백
  aiLevel = 3;
  clearHint();
  updateSetupPalette();
  newGame();
  maybeScheduleAI();
}

// 가운데 버튼: 평소→구성중→완성(대국대기) 순환
function toggleSetupMode() {
  if (!setupMode && !setupReady) {
    enterSetupMode();              // 평소 → 배치 시작
  } else if (setupMode) {
    finishPlacing();               // 배치 중 → 배치 완료(흑/백 골라 시작 대기)
  } else {
    exitSetupMode();               // 배치 완료 상태에서 다시 누르면 취소→홈
  }
}

let setupReady_removed_dup = false;
function finishPlacing() {
  if (board.flat().every(v => v === EMPTY)) {
    showToast('돌을 먼저 놓으세요');
    return;
  }
  setupMode = false;
  setupReady = true;
  document.getElementById('btnSetupMode').textContent = '흑◀ ▶백 선택';
  updateSetupPalette();
  const label = document.getElementById('turnLabel');
  if (label) label.innerHTML = '선착할 색을 누르세요 · 보통 흑돌 (내가 먼저)';
}

function enterSetupMode() {
  setupMode = true;
  setupReady = false;
  clearHint();
  clearTimeout(aiTimer);
  aiThinking = false;
  gameOver = false;
  fixing = false;
  // 빈 판에서 시작
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
  captures = { [BLACK]: 0, [WHITE]: 0 };
  history = []; redoStack = []; positions = []; gtpMoves = [];
  lastMove = null; passCount = 0;
  deadStones = new Set();
  territoryMarks = [];
  setupColor = BLACK;
  document.getElementById('setupBar').classList.add('placing');
  document.getElementById('btnSetupMode').textContent = '판 구성 중';
  updateSetupPalette();
  renderStones();
  const label = document.getElementById('turnLabel');

// 배치 취소 → 초기 화면으로 복귀

  setupReady = false;
  document.getElementById('setupBar').classList.remove('placing');

// 배치 후 흑돌/백돌 터치 → 그 색으로 사람이 선착해 대국 시작

  document.getElementById('setupBar').classList.remove('placing');
  document.getElementById('btnSetupMode').textContent = '판 놓아보기';
  updateSetupPalette();

  gameMode = 'ai';
  aiColor = (firstColor === BLACK ? WHITE : BLACK);   // 사람이 firstColor, AI는 반대

  turn = firstColor;

  fixing = false;
  clearHint();
  rebuildGtpFromBoard();
  history = []; redoStack = [];

  setPlayerNames();

// 흑돌/백돌 버튼: 배치 중=색 선택, 배치 완료=그 색으로 대국 시작

function updateSetupPalette() {
  const b = document.getElementById('palBlack');

  if (w) w.classList.toggle('sel', setupMode && setupColor === WHITE);

// 배치 모드에서 한 점 탭: 빈 자리면 현재 색 놓기, 돌 있으면 지우기
function setupPlace(x, y) {
  if (board[y][x] !== EMPTY) {
    board[y][x] = EMPTY;
  } else {
    board[y][x] = setupColor;
  }
  renderStones();
}

// 현재 board 상태를 gtpMoves 목록으로 재구성 (흑 먼저, 그다음 백 — 순서 무관)
function rebuildGtpFromBoard() {
  gtpMoves = [];
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++)
    if (board[y][x] === BLACK) gtpMoves.push(['b', toGtp(x, y)]);
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++)
    if (board[y][x] === WHITE) gtpMoves.push(['w', toGtp(x, y)]);
}

      s.setAttribute('cx', px(x)); s.setAttribute('cy', py(y));

        m.setAttribute('r', 5.5);

      }
    }
  }

  // 힌트 점 (KataGo 추천 수): 최선은 크고 선명, 나머지는 작고 흐릿
  for (const h of hintMarks) {
    if (board[h.y][h.x] !== EMPTY) continue;

function updateStatus() {
  document.getElementById('capBlack').textContent = captures[BLACK];
  document.getElementById('capWhite').textContent = captures[WHITE];

  else if (gameOver) label.innerHTML = '대국 종료';
  else label.innerHTML = `<b>${turn === BLACK ? '흑' : '백'}</b> 차례`;

  document.getElementById('playControls').classList.toggle('hidden', fixing);
  document.getElementById('fixControls').classList.toggle('hidden', !fixing);
}

// ---------- 그룹과 활로 ----------
function getGroup(x, y, b = board) {
  const color = b[y][x];
  const stones = [];
  const liberties = new Set();
  const visited = new Set();
  const stack = [[x, y]];

  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = cx + ',' + cy;
    if (visited.has(key)) continue;
    visited.add(key);
    stones.push([cx, cy]);

    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
      if (b[ny][nx] === EMPTY) liberties.add(nx + ',' + ny);
      else if (b[ny][nx] === color) stack.push([nx, ny]);
    }
  }
  return { stones, liberties: liberties.size };
}

function boardString(b) { return b.map(row => row.join('')).join(''); }

// ---------- 착수 ----------
function tryMove(x, y) {
  if (gameOver) { showToast('대국이 끝났습니다. 새 대국을 눌러주세요'); return; }
  if (board[y][x] !== EMPTY) return;

  const backup = board.map(row => row.slice());
  board[y][x] = turn;

  const enemy = turn === BLACK ? WHITE : BLACK;
  let capturedCount = 0;
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
    if (board[ny][nx] !== enemy) continue;
    const grp = getGroup(nx, ny);
    if (grp.liberties === 0) {
      for (const [sx, sy] of grp.stones) { board[sy][sx] = EMPTY; capturedCount++; }
    }
  }

  if (getGroup(x, y).liberties === 0) {
    board = backup;
    showToast('둘 수 없는 자리입니다 (자살수)');
    return;
  }

  const newStr = boardString(board);
  if (positions.length >= 2 && newStr === positions[positions.length - 2]) {
    board = backup;
    showToast('패입니다. 다른 곳에 한 수 두세요');
    return;
  }

  history.push({
    board: backup,
    turn, captures: { ...captures },
    lastMove, passCount,
    positions: positions.slice()
  });
  captures[turn] += capturedCount;
  positions.push(newStr);
  lastMove = { x, y };
  passCount = 0;
  gtpMoves.push([turn === BLACK ? 'b' : 'w', toGtp(x, y)]);
  redoStack = [];        // 새 수를 뒀으니 앞으로가기(redo) 기록은 무효
  clearHint();
  turn = enemy;
  playStoneSound(capturedCount > 0);
  renderStones();
  maybeScheduleAI();
}

// ---------- 한 수 쉬기 ----------
function pass() {
  if (gameOver) return;
  if (aiThinking) { showToast('AI가 생각 중입니다'); return; }
  if (gameMode === 'ai' && turn === aiColor && !aiActing) return;
  history.push({
    board: board.map(r => r.slice()),
    turn, captures: { ...captures },
    lastMove, passCount,
    positions: positions.slice()
  });
  passCount++;
  positions.push(boardString(board));
  gtpMoves.push([turn === BLACK ? 'b' : 'w', 'pass']);
  lastMove = null;
  turn = turn === BLACK ? WHITE : BLACK;

  if (passCount >= 2) {
    requestScoring();
  } else {
    playPassSound();
    showToast(`${turn === BLACK ? '백' : '흑'}이 한 수 쉬었습니다`);
    renderStones();
    maybeScheduleAI();
  }
}

// ---------- 계가 요청 ----------
function requestScoring() {
  if (aiThinking) { showToast('AI가 생각 중입니다'); return; }
  if (board.flat().every(v => v === EMPTY)) { showToast('아직 둔 수가 없습니다'); return; }
  clearTimeout(aiTimer);
  gameOver = true;
  // AI 대국이면 서버의 KataGo에게 정확한 계가를 맡긴다 (몬테카를로 오판 방지)
  if (gameMode === 'ai') {
    scoreByServer();
    return;
  }
  showToast('죽은 돌을 판정하는 중...', 3000);
  setTimeout(() => {
    autoDetectDead();
    calculateScore();
  }, 50);
}

// KataGo 서버에게 최종 점수를 물어 결과 카드를 띄운다
async function scoreByServer() {
  showToast('KataGo가 계가하는 중...', 3000);
  try {
    const res = await fetch(KATAGO_SERVER + '/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ moves: gtpMoves, boardsize: SIZE, komi: KOMI }),
    });
    if (!res.ok) throw new Error('서버 오류 ' + res.status);
    const data = await res.json();
    const s = data.score;                 // 예: "B+2.5", "W+3.5", "0" (무승부)
    if (!s) throw new Error('점수 없음');
    showServerResult(s);
  } catch (e) {
    // 서버 실패 시 기존 방식으로 대체
    showToast('서버 계가 실패 — 자체 계가로 판정합니다', 2500);
    setTimeout(() => { autoDetectDead(); calculateScore(); }, 50);
  }
}

// "B+2.5" 같은 KataGo 결과를 결과 카드로 표시
function showServerResult(scoreStr) {
  let winner = '', diff = '';
  const str = String(scoreStr).trim();
  if (str === '0' || str.toUpperCase() === 'DRAW') {
    winner = null;
  } else {
    const side = str[0].toUpperCase();
    winner = side === 'B' ? '흑' : side === 'W' ? '백' : null;
    diff = str.slice(2);                  // "B+2.5" → "2.5"
  }
  const overlay = document.getElementById('resultOverlay');
  overlay.className = 'result-overlay';
  const title = winner
    ? `<h2><span>${winner}</span> ${diff}집 승</h2>`
    : `<h2>무승부</h2>`;
  overlay.innerHTML = `
    <div class="result-card">
      ${title}
      <div class="detail">KataGo가 정밀 계가한 결과입니다.</div>
      <div class="btns" style="grid-template-columns:1fr 1fr 1fr">
        <button id="btnCopyS">기록 복사</button>
        <button id="btnBackS">계속 두기</button>
        <button id="btnNewS" class="primary">새 대국</button>
      </div>
    </div>`;
  document.getElementById('btnCopyS').addEventListener('click', copyGameRecord);
  document.getElementById('btnBackS').addEventListener('click', () => {
    overlay.className = 'hidden'; overlay.innerHTML = '';
    gameOver = false;
  });
  document.getElementById('btnNewS').addEventListener('click', () => {
    overlay.className = 'hidden'; overlay.innerHTML = '';
    goHome();
  });

  // ----- Rank Record 갱신 -----
  // 내 돌 색 기준으로 이겼는지/졌는지 + 집수차 계산
  if (winner !== null && diff) {
    const myColorChar = (aiColor === BLACK) ? '백' : '흑';   // 내 돌 = AI 반대색
    const margin = parseFloat(diff);                          // 집수차 (양수)
    const iWon = (winner === myColorChar);
    // 진 경우: 양수(진 집수, 소수점 버림). 이긴 경우: 음수(이긴 집수).
    const rankScore = iWon ? -Math.floor(margin) : Math.floor(margin);
    saveRankScore(rankScore);
  }
}

// Rank 점수를 서버에 저장하고 표시 갱신
async function saveRankScore(score) {
  const user = (document.getElementById('userId').textContent || 'CQ_haus').trim();
  try {
    const res = await fetch(KATAGO_SERVER + '/rank_add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, score, hint: hintUsedThisGame }),
    });
    if (res.ok) {
      const data = await res.json();
      renderRank(data.history, data.best);
    }
  } catch (e) { /* 서버 연결 실패 시 조용히 무시 */ }
}

// 최근 10개 기록과 최고 성적을 화면에 표시
function renderRank(history, best) {
  const listEl = document.getElementById('rrList');
  if (listEl) {
    if (!history || !history.length) {
      listEl.textContent = '—';
    } else {
      // 각 점수: 양수=진 집수(그냥), 음수=이긴 집수(초록 +N)
      listEl.innerHTML = history.map(s =>
        s < 0 ? `<span class="rr-win">+${-s}</span>` : `${s}`
      ).join(' - ');
    }
  }
  const rankEl = document.getElementById('userRank');
  if (rankEl) {
    if (best === null || best === undefined) {
      rankEl.textContent = 'Rank —';
      rankEl.classList.remove('win');
    } else if (best < 0) {
      rankEl.textContent = `Rank +${-best}`;
      rankEl.classList.add('win');
    } else {
      rankEl.textContent = `Rank ${best}`;
      rankEl.classList.remove('win');
    }
  }
}

// 앱 시작 시 저장된 Rank 불러오기
async function loadRank() {
  const user = (document.getElementById('userId').textContent || 'CQ_haus').trim();
  try {
    const res = await fetch(KATAGO_SERVER + '/rank_get?user=' + encodeURIComponent(user));
    if (res.ok) {
      const data = await res.json();
      renderRank(data.history, data.best);
    }
  } catch (e) { /* 무시 */ }
}

// 빠른 그룹+활로 탐색 (판정 전용, 숫자 키 사용)
function getGroupFast(b, x, y) {
  const color = b[y][x];
  const stones = [];
  const libs = new Set();
  const visited = new Set();
  const stack = [[x, y]];
  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = cx * 16 + cy;
    if (visited.has(key)) continue;
    visited.add(key);
    stones.push([cx, cy]);
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
      if (b[ny][nx] === EMPTY) libs.add(nx * 16 + ny);
      else if (b[ny][nx] === color) stack.push([nx, ny]);
    }
  }
  return { stones, libs: libs.size };
}

// 내 눈(자기 집 한 칸) 판정 — 무작위 대국에서 눈은 채우지 않음
function isOwnEye(b, x, y, color) {
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
    if (b[ny][nx] !== color) return false;
  }
  let enemyDiag = 0, offBoard = 0;
  for (const [dx, dy] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) { offBoard++; continue; }
    const c = b[ny][nx];
    if (c !== EMPTY && c !== color) enemyDiag++;
  }
  if (offBoard > 0) return enemyDiag === 0;
  return enemyDiag <= 1;
}

// 착수 시도: 합법이면 보드를 수정하고 정보 반환, 불법이면 null
function tryPlayFast(b, x, y, color, ko) {
  if (b[y][x] !== EMPTY) return null;
  if (ko && ko[0] === x && ko[1] === y) return null;

  b[y][x] = color;
  const enemy = color === BLACK ? WHITE : BLACK;
  const captured = [];
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
    if (b[ny][nx] !== enemy) continue;
    const g = getGroupFast(b, nx, ny);
    if (g.libs === 0) {
      for (const [sx, sy] of g.stones) { b[sy][sx] = EMPTY; captured.push([sx, sy]); }
    }
  }
  const own = getGroupFast(b, x, y);
  if (own.libs === 0) {
    b[y][x] = EMPTY;
    for (const [sx, sy] of captured) b[sy][sx] = enemy;
    return null;
  }
  let newKo = null;
  if (captured.length === 1 && own.stones.length === 1 && own.libs === 1) {
    newKo = captured[0];   // 단패 자리 — 상대는 바로 되따내지 못함
  }
  return { ko: newKo };
}

// 무작위 마무리 한 판: 눈 채우기 금지, 합법수 없으면 쉼, 두 번 쉬면 종료
function playout(startBoard, startTurn) {
  const b = startBoard.map(r => r.slice());
  let t = startTurn;
  let ko = null;
  let passes = 0, moves = 0;
  const empties = [];

  while (passes < 2 && moves < 220) {
    empties.length = 0;
    for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
      if (b[y][x] === EMPTY) empties.push([x, y]);
    }
    let played = false;
    for (let i = empties.length - 1; i >= 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [empties[i], empties[j]] = [empties[j], empties[i]];
      const [x, y] = empties[i];
      if (isOwnEye(b, x, y, t)) continue;
      const res = tryPlayFast(b, x, y, t, ko);
      if (res) { ko = res.ko; played = true; break; }
    }
    if (played) { passes = 0; moves++; }
    else { passes++; ko = null; }
    t = t === BLACK ? WHITE : BLACK;
  }
  return b;
}

// 무작위 대국 수백 판의 최종 소유권 통계로 각 그룹의 생존율 계산
function autoDetectDead() {
  // 각 지점이 흑 소유로 끝난 횟수
  const own = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));

  for (let p = 0; p < PLAYOUTS; p++) {
    const fin = playout(board, turn);
    const visited = new Set();
    for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
      if (fin[y][x] === BLACK) own[y][x]++;
      else if (fin[y][x] === EMPTY && !visited.has(x * 16 + y)) {
        const region = [];
        const borders = new Set();
        const stack = [[x, y]];
        while (stack.length) {
          const [cx, cy] = stack.pop();
          const key = cx * 16 + cy;
          if (visited.has(key)) continue;
          visited.add(key);
          region.push([cx, cy]);
          for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
            const nx = cx + dx, ny = cy + dy;
            if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
            if (fin[ny][nx] === EMPTY) stack.push([nx, ny]);
            else borders.add(fin[ny][nx]);
          }
        }
        if (borders.size === 1 && borders.has(BLACK)) {
          for (const [rx, ry] of region) own[ry][rx]++;
        }
      }
    }
  }

  // 그룹별 생존율: 자기 자리가 자기 색 소유로 끝난 비율
  deadStones = new Set();
  const seen = new Set();
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    if (board[y][x] === EMPTY || seen.has(x + ',' + y)) continue;
    const grp = getGroup(x, y);
    let sum = 0;
    for (const [sx, sy] of grp.stones) {
      seen.add(sx + ',' + sy);
      sum += own[sy][sx] / PLAYOUTS;
    }
    const blackRate = sum / grp.stones.length;
    const color = board[y][x];
    const survivalRate = color === BLACK ? blackRate : 1 - blackRate;
    if (survivalRate < 0.5) {
      for (const [sx, sy] of grp.stones) deadStones.add(sx + ',' + sy);
    }
  }
}

// ---------- 집 계산 ----------
function calculateScore() {
  const work = board.map(r => r.slice());
  let deadBlack = 0, deadWhite = 0;
  for (const key of deadStones) {
    const [x, y] = key.split(',').map(Number);
    if (work[y][x] === BLACK) deadBlack++;
    if (work[y][x] === WHITE) deadWhite++;
    work[y][x] = EMPTY;
  }

  const visited = new Set();
  let terrBlack = 0, terrWhite = 0;
  territoryMarks = [];

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (work[y][x] !== EMPTY || visited.has(x + ',' + y)) continue;

      const region = [];
      const borders = new Set();
      const stack = [[x, y]];
      while (stack.length) {
        const [cx, cy] = stack.pop();
        const key = cx + ',' + cy;
        if (visited.has(key)) continue;
        visited.add(key);
        region.push([cx, cy]);
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
          if (work[ny][nx] === EMPTY) stack.push([nx, ny]);
          else borders.add(work[ny][nx]);
        }
      }

      if (borders.size === 1) {
        const owner = borders.has(BLACK) ? BLACK : WHITE;
        if (owner === BLACK) terrBlack += region.length;
        else terrWhite += region.length;
        for (const [rx, ry] of region) territoryMarks.push({ x: rx, y: ry, color: owner });
      }
    }
  }

  const scoreBlack = terrBlack + captures[BLACK] + deadWhite;
  const scoreWhite = terrWhite + captures[WHITE] + deadBlack + KOMI;

  fixing = false;
  renderStones();
  showResult({ scoreBlack, scoreWhite, terrBlack, terrWhite,
               capBlack: captures[BLACK] + deadWhite,
               capWhite: captures[WHITE] + deadBlack });
}

// ---------- 결과 카드 ----------
function showResult(r) {
  const diff = Math.abs(r.scoreBlack - r.scoreWhite);
  const winner = r.scoreBlack > r.scoreWhite ? '흑' : '백';
  const overlay = document.getElementById('resultOverlay');
  overlay.className = 'result-overlay';
  overlay.innerHTML = `
    <div class="result-card">
      <h2><span>${winner}</span> ${diff}집 승</h2>
      <div class="detail">
        흑: 집 <b>${r.terrBlack}</b> + 사석 <b>${r.capBlack}</b> = <b>${r.scoreBlack}</b>집<br>
        백: 집 <b>${r.terrWhite}</b> + 사석 <b>${r.capWhite}</b> + 덤 <b>${KOMI}</b> = <b>${r.scoreWhite}</b>집
      </div>
      <div class="btns">
        <button id="btnFix">판정 수정</button>
        <button id="btnBack">계속 두기</button>
        <button id="btnNewFromResult" class="primary">새 대국</button>
      </div>
    </div>`;
  document.getElementById('btnFix').addEventListener('click', () => {
    closeResult();
    fixing = true;
    showToast('잘못 판정된 돌을 탭해서 고친 뒤 [계가 완료]를 누르세요', 3000);
    renderStones();
  });
  document.getElementById('btnBack').addEventListener('click', () => {
    closeResult();
    resumePlay();
  });
  document.getElementById('btnNewFromResult').addEventListener('click', () => {
    closeResult();
    goHome();
  });
}

function closeResult() {
  const overlay = document.getElementById('resultOverlay');
  overlay.className = 'hidden';
  overlay.innerHTML = '';
}

// ---------- 판정 수정 ----------
function toggleDead(x, y) {
  if (board[y][x] === EMPTY) return;
  const grp = getGroup(x, y);
  const nowDead = !deadStones.has(x + ',' + y);
  for (const [sx, sy] of grp.stones) {
    const key = sx + ',' + sy;
    if (nowDead) deadStones.add(key);
    else deadStones.delete(key);
  }
  territoryMarks = [];
  renderStones();
}

// ---------- 계속 두기 ----------
function resumePlay() {
  fixing = false;
  gameOver = false;
  passCount = 0;
  deadStones = new Set();
  territoryMarks = [];
  showToast('대국을 계속합니다');
  renderStones();
}

// ---------- 무르기 ----------
function undo() {
  if (aiThinking) { showToast('AI가 생각 중입니다'); return; }
  if (!history.length) { showToast('무를 수가 없습니다'); return; }
  clearTimeout(aiTimer);
  clearHint();

  function popOnce() {
    // 현재 상태를 redo 스택에 저장 (앞으로 다시 갈 수 있게)
    redoStack.push({
      board: board.map(r => r.slice()),
      turn, captures: { ...captures },
      lastMove, passCount,
      positions: positions.slice(),
      gtpMoves: gtpMoves.slice(),
    });
    const prev = history.pop();
    board = prev.board;
    turn = prev.turn;
    captures = prev.captures;
    lastMove = prev.lastMove;
    passCount = prev.passCount;
    positions = prev.positions;
    gtpMoves.pop();   // 서버용 기록도 한 수 되돌림
  }
  popOnce();
  // AI 대국: 방금 무른 게 AI의 수였다면 내 수까지 한 번 더 무름
  if (gameMode === 'ai' && turn === aiColor && history.length) popOnce();

  gameOver = false;
  fixing = false;
  deadStones = new Set();
  territoryMarks = [];
  renderStones();
  // 무르기 후에는 AI 자동 착수를 하지 않는다 (사용자가 다시 두거나 =>로 진행)
}

// 한 수 앞으로 (무르기 되돌리기)
function redo() {
  if (aiThinking) { showToast('AI가 생각 중입니다'); return; }
  if (!redoStack.length) { showToast('되돌릴 수가 없습니다'); return; }
  clearTimeout(aiTimer);
  clearHint();

  function pushForward() {
    // 현재 상태를 history에 저장하고, redo 스택에서 다음 상태 복원
    history.push({
      board: board.map(r => r.slice()),
      turn, captures: { ...captures },
      lastMove, passCount,
      positions: positions.slice(),
    });
    const nxt = redoStack.pop();
    board = nxt.board;
    turn = nxt.turn;
    captures = nxt.captures;
    lastMove = nxt.lastMove;
    passCount = nxt.passCount;
    positions = nxt.positions;
    gtpMoves = nxt.gtpMoves;
  }
  pushForward();
  // AI 대국: 한 번 더 앞으로 (내 수 + AI 수 쌍)
  if (gameMode === 'ai' && turn === aiColor && redoStack.length) pushForward();

  renderStones();
}

// ---------- 새 대국 ----------
function newGame() {
  clearTimeout(aiTimer);
  aiThinking = false;
  aiLowStreak = 0;
  hintUsedThisGame = false;   // 힌트 사용 여부 초기화
  gtpMoves = [];          // 서버용 착수 기록 초기화
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
  turn = BLACK;
  captures = { [BLACK]: 0, [WHITE]: 0 };
  history = [];
  positions = [boardString(board)];
  passCount = 0;
  gameOver = false;
  fixing = false;
  lastMove = null;
  deadStones = new Set();
  territoryMarks = [];
  placeHandicap();       // 접바둑이면 흑 미리 배치
  setPlayerNames();
  renderStones();
}

// 접바둑: 9x9 표준 화점에 흑을 미리 놓고 백부터 두게 함
function placeHandicap() {
  if (!handicap || handicap < 2) return;
  const pts = {
    2: [[2,6],[6,2]],
    3: [[2,6],[6,2],[6,6]],
    4: [[2,2],[2,6],[6,2],[6,6]],
    5: [[2,2],[2,6],[6,2],[6,6],[4,4]],
  }[handicap] || [];
  for (const [x, y] of pts) { board[y][x] = BLACK; gtpMoves.push(['b', toGtp(x, y)]); }
  turn = WHITE;                         // 흑이 미리 놓았으니 백부터
  positions = [boardString(board)];
}

// ---------- 안내 메시지 ----------
let toastTimer;
function showToast(msg, duration = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

let audioCtx = null;
let stoneBuffers = [];
let captureBuffers = [];
let passBuffer = null;

function decodeB64(b64str, onDone) {
  const bin = atob(b64str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  audioCtx.decodeAudioData(bytes.buffer, onDone, () => {});
}

function initSound() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    for (const s of STONE_B64) decodeB64(s, buf => stoneBuffers.push(buf));
    for (const s of CAPTURE_B64) decodeB64(s, buf => captureBuffers.push(buf));
    decodeB64(PASS_B64, buf => { passBuffer = buf; });
  } catch (e) { audioCtx = null; }
}

function playBuffer(buf, gainVal) {
  if (!audioCtx || !buf) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.value = gainVal;
  src.connect(g).connect(audioCtx.destination);
  src.start();
}

/* ============================================================
   AI 대국 엔진 (2단계)
   계가에 쓰는 몬테카를로를 수읽기로 확장:
   각 후보 수마다 "그 수를 둔 뒤 무작위로 끝까지 두면
   몇 % 이기는가"를 계산해서 승률이 가장 높은 수를 고른다.
   얕게 훑기 → 상위만 추리기 → 깊게 읽기 3단계로 시간을 아낀다.
   ============================================================ */

// 중국식 집계: 흑 점수 - (백 점수 + 덤). 무작위 종국판은 눈만 남으므로 정확.
function areaScoreDiff(fin) {
  let black = 0, white = 0;
  const visited = new Set();
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    const c = fin[y][x];
    if (c === BLACK) black++;
    else if (c === WHITE) white++;
    else if (!visited.has(x * 16 + y)) {
      const region = [];
      const borders = new Set();
      const stack = [[x, y]];
      while (stack.length) {
        const [cx, cy] = stack.pop();
        const key = cx * 16 + cy;
        if (visited.has(key)) continue;
        visited.add(key);
        region.push([cx, cy]);
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
          if (fin[ny][nx] === EMPTY) stack.push([nx, ny]);
          else borders.add(fin[ny][nx]);
        }
      }
      if (borders.size === 1) {
        if (borders.has(BLACK)) black += region.length;
        else white += region.length;
      }
    }
  }
  return black - (white + KOMI);
}

function tick() { return new Promise(r => setTimeout(r, 0)); }

function countStones() {
  let n = 0;
  for (const row of board) for (const c of row) if (c !== EMPTY) n++;
  return n;
}

// AI의 합법 후보 수 (초반엔 가장자리 1선 제외 — 속도와 기력 모두에 이득)
function legalAIMoves(color) {
  const out = [];
  const opening = countStones() < 6;
  const enemyC = color === BLACK ? WHITE : BLACK;

  // 단수(활로 1)에 몰린 내 그룹의 활로 지점: 거기 두면 그 돌들을 살림
  const rescuePoints = new Map();
  const seenG = new Set();
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    if (board[y][x] !== color || seenG.has(x * 16 + y)) continue;
    const g = getGroupFast(board, x, y);
    for (const [sx, sy] of g.stones) seenG.add(sx * 16 + sy);
    if (g.libs === 1) {
      for (const [sx, sy] of g.stones) {
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = sx + dx, ny = sy + dy;
          if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && board[ny][nx] === EMPTY) {
            const k = nx + ',' + ny;
            rescuePoints.set(k, (rescuePoints.get(k) || 0) + g.stones.length);
          }
        }
      }
    }
  }

  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    if (board[y][x] !== EMPTY) continue;
    if (opening && (x < 1 || x > SIZE - 2 || y < 1 || y > SIZE - 2)) continue;
    if (isOwnEye(board, x, y, color)) continue;
    const b = board.map(r => r.slice());
    let enemyBefore = 0, enemyAfter = 0;
    for (const row of board) for (const c of row) if (c === enemyC) enemyBefore++;
    if (!tryPlayFast(b, x, y, color, null)) continue;             // 자살수 등
    const s = boardString(b);
    if (positions.length >= 2 && s === positions[positions.length - 2]) continue; // 패
    for (const row of b) for (const c of row) if (c === enemyC) enemyAfter++;
    const capCount = enemyBefore - enemyAfter;                    // 따내는 돌 수
    const saveCount = rescuePoints.get(x + ',' + y) || 0;         // 살리는 돌 수
    // 무작위 수읽기는 '어차피 죽을 돌'을 지금 잡을 이유를 못 느끼므로
    // 따내기/살리기에 가산점을 줘서 사람다운 전술 감각을 입힌다
    const bonus = Math.min(0.45, capCount * 0.18) + Math.min(0.35, saveCount * 0.12);
    out.push({ x, y, wins: 0, visits: 0, bonus });
  }
  return out;
}

// 최종 평가 = 몬테카를로 승률 + 전술 보너스
function moveRate(m) { return m.wins / m.visits + m.bonus; }

// 후보 수들을 각각 nEach판씩 무작위 종국까지 둬보고 승수를 기록
async function evalMoves(cands, nEach, enemy) {
  let sinceTick = 0;
  for (const m of cands) {
    const base = board.map(r => r.slice());
    tryPlayFast(base, m.x, m.y, aiColor, null);
    for (let p = 0; p < nEach; p++) {
      const fin = playout(base, enemy);
      const diff = areaScoreDiff(fin);
      const aiWin = aiColor === BLACK ? diff > 0 : diff < 0;
      if (aiWin) m.wins++;
      m.visits++;
    }
    sinceTick += nEach;
    if (sinceTick >= 60) { sinceTick = 0; await tick(); }  // 화면이 굳지 않게 숨 고르기
  }
}

function maybeScheduleAI() {
  if (gameMode !== 'ai' || gameOver || fixing) return;
  if (turn !== aiColor || aiThinking) return;
  clearTimeout(aiTimer);
  aiTimer = setTimeout(aiMove, 420);
}

async function aiMove() {
  if (gameOver || aiThinking || turn !== aiColor) return;
  aiThinking = true;
  updateStatus();
  await tick();

  // ----- 서버의 KataGo에게 다음 수를 물어본다 -----
  try {
    const color = aiColor === BLACK ? 'b' : 'w';
    const res = await fetch(KATAGO_SERVER + '/genmove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ moves: gtpMoves, color: color, boardsize: SIZE, komi: KOMI }),
    });
    if (!res.ok) throw new Error('서버 응답 오류 ' + res.status);
    const data = await res.json();
    const mv = data.move;                      // "F6" / "pass" / "resign"
    aiThinking = false;

    if (!mv || mv.toLowerCase() === 'resign') {
      aiResign();                              // KataGo가 돌을 던짐
      return;
    }
    if (mv.toLowerCase() === 'pass') {
      aiActing = true; pass(); aiActing = false;
      return;
    }
    const p = fromGtp(mv);
    aiActing = true; tryMove(p.x, p.y); aiActing = false;
    return;
  } catch (e) {
    aiThinking = false;
    updateStatus();
    showToast('AI 서버에 연결할 수 없습니다. 노트북 서버와 Tailscale을 확인하세요');
    return;
  }
}

}

/* ---------- 대국 설정 화면 ---------- */
function showSetup() {
  clearTimeout(aiTimer);
  let selMode = gameMode || 'ai';
  let selColor = (aiColor === WHITE ? BLACK : WHITE);   // "내 돌" 기준
  let selKomi = KOMI;
  let selHandi = handicap;
  const overlay = document.getElementById('setupOverlay');
  overlay.className = 'result-overlay';

  function render() {
    const aiRows = selMode === 'ai' ? '' : ' style="display:none"';
    overlay.innerHTML = '<div class="result-card">'
      + '<h2>새 <span>대국</span></h2>'
      + '<div class="opt-label">사용자 아이디</div>'
      + '<input type="text" id="userIdInput" class="id-input" maxlength="16" value="'
      + (document.getElementById('userId').textContent || 'CQ_haus').replace(/"/g, '') + '">'
      + '<div class="opt-label">대국 상대</div>'
      + '<div class="opt-row">'
      + '<button class="opt' + (selMode === 'ai' ? ' sel' : '') + '" data-k="mode" data-v="ai">AI와 대국</button>'
      + '<button class="opt' + (selMode === 'pvp' ? ' sel' : '') + '" data-k="mode" data-v="pvp">둘이서 두기</button>'
      + '</div>'
      + '<div' + aiRows + '>'
      + '<div class="opt-label">내 돌</div>'
      + '<div class="opt-row">'
      + '<button class="opt' + (selColor === BLACK ? ' sel' : '') + '" data-k="color" data-v="b">흑 (먼저)</button>'
      + '<button class="opt' + (selColor === WHITE ? ' sel' : '') + '" data-k="color" data-v="w">백</button>'
      + '</div>'
      + '<div class="opt-hint">상대는 KataGo 신경망 (1단급) · 한 수에 몇 초 생각합니다</div>'
      + '</div>'
      + '<div class="opt-label">덤 (공제)</div>'
      + '<div class="stepper"><button class="step" data-k="komi-">−</button>'
      + '<span class="stepval" id="komiVal">' + selKomi.toFixed(1) + '</span>'
      + '<button class="step" data-k="komi+">+</button></div>'
      + '<div class="opt-label">치수 (접바둑)</div>'
      + '<div class="stepper"><button class="step" data-k="handi-">−</button>'
      + '<span class="stepval" id="handiVal">' + (selHandi === 0 ? '호선' : selHandi + '점') + '</span>'
      + '<button class="step" data-k="handi+">+</button></div>'
      + '<button class="primary setup-start" id="btnStart">대국 시작</button>'
      + '</div>';

    overlay.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.dataset.k, v = btn.dataset.v;
        if (k === 'mode') {
          selMode = v;
          if (v === 'pvp') { startGame(); return; }  // 둘이서 두기는 바로 시작
        }
        if (k === 'color') selColor = (v === 'b' ? BLACK : WHITE);
        render();
      });
    });
    overlay.querySelectorAll('.step').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.dataset.k;
        if (k === 'komi-') selKomi = Math.max(0.5, Math.round((selKomi - 1) * 10) / 10);
        if (k === 'komi+') selKomi = Math.min(9.5, Math.round((selKomi + 1) * 10) / 10);
        if (k === 'handi-') selHandi = Math.max(0, selHandi - 1);
        if (k === 'handi+') selHandi = Math.min(5, selHandi + 1);
        // 접바둑이면 덤은 통상 0.5로 (표시만 갱신, 사용자가 다시 조절 가능)
        render();
      });
    });
    document.getElementById('btnStart').addEventListener('click', startGame);
  }

  function startGame() {
    // 사용자 아이디 저장
    const idInput = document.getElementById('userIdInput');
    if (idInput) {
      const newId = idInput.value.trim() || 'CQ_haus';
      const idEl = document.getElementById('userId');
      if (idEl && idEl.textContent !== newId) {
        idEl.textContent = newId;
        loadRank();     // 아이디 바뀌면 그 사람 기록 불러오기
      }
    }
    gameMode = selMode;
    KOMI = selKomi;
    handicap = selHandi;
    if (selMode === 'ai') {
      aiColor = (selColor === BLACK ? WHITE : BLACK);
      aiLevel = 3;
    }
    overlay.className = 'hidden';
    overlay.innerHTML = '';
    newGame();
    maybeScheduleAI();
  }

  render();
}
