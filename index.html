<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아홉 · 9_Square — 9줄 바둑</title>
<style>
  :root {
    --bg: #1c2622;
    --bg-soft: #26332e;
    --line: #4a3315;
    --ink: #efe9dc;
    --ink-dim: #9aa79f;
    --accent: #3fa66b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
    min-height: 100dvh;
  }

  header {
    width: 100%;
    max-width: 460px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 6px 4px 12px;
  }
  header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.06em; }
  header h1 span { color: var(--accent); }
  header .sub { font-size: 12px; color: var(--ink-dim); letter-spacing: 0.12em; }

  .status {
    width: 100%;
    max-width: 460px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: var(--bg-soft);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .player { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .player.white { justify-content: flex-end; }
  .dot {
    width: 18px; height: 18px; border-radius: 50%; flex: none;
    transition: box-shadow 0.25s ease;
  }
  .dot.black { background: radial-gradient(circle at 35% 30%, #4d4d4d, #111 70%); }
  .dot.white { background: radial-gradient(circle at 35% 30%, #ffffff, #d8d4c8 75%); border: 1px solid #b9b4a5; }
  .player.turn .dot { box-shadow: 0 0 0 3px var(--accent); }
  .captures { font-size: 12px; color: var(--ink-dim); }
  .turn-label { font-size: 13px; color: var(--ink-dim); text-align: center; padding: 0 10px; white-space: nowrap; }
  .turn-label b { color: var(--ink); }

  .board-wrap {
    width: 100%;
    max-width: 460px;
    aspect-ratio: 460 / 492;
    position: relative;
  }
  svg {
    width: 100%; height: 100%; display: block;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  }

  .stone.dead { opacity: 0.35; }

  .controls {
    width: 100%;
    max-width: 460px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    font: inherit; font-size: 15px; font-weight: 700;
    color: var(--ink);
    background: var(--bg-soft);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 13px 0;
    cursor: pointer;
    transition: transform 0.05s ease, background 0.15s ease;
  }
  button:active { transform: scale(0.96); background: #31413a; }
  button.primary { background: var(--accent); border-color: transparent; }
  button.primary:active { background: #2f7d50; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .hidden { display: none !important; }

  .toast {
    position: fixed; left: 50%; bottom: 100px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.85);
    color: var(--ink); font-size: 14px;
    padding: 10px 18px; border-radius: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .result-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .result-card {
    background: var(--bg-soft);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 26px 24px 20px;
    width: 100%; max-width: 340px;
    text-align: center;
  }
  .result-card h2 { font-size: 22px; margin-bottom: 4px; }
  .result-card h2 span { color: var(--accent); }
  .result-card .detail { font-size: 14px; color: var(--ink-dim); line-height: 1.7; margin: 12px 0 18px; }
  .result-card .detail b { color: var(--ink); }
  .result-card .btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .result-card .btns button { font-size: 13px; padding: 11px 0; }
</style>
</head>
<body>

<header>
  <h1>아홉 <span>9_Square</span></h1>
  <div class="sub">아홉 줄 바둑</div>
</header>

<div class="status">
  <div class="player black" id="pBlack">
    <div class="dot black"></div>
    <div>
      <div>흑</div>
      <div class="captures">사석 <b id="capBlack">0</b></div>
    </div>
  </div>
  <div class="turn-label" id="turnLabel"><b>흑</b> 차례</div>
  <div class="player white" id="pWhite">
    <div>
      <div style="text-align:right">백</div>
      <div class="captures">사석 <b id="capWhite">0</b></div>
    </div>
    <div class="dot white"></div>
  </div>
</div>

<div class="board-wrap">
  <svg id="board" viewBox="0 0 460 492" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="controls" id="playControls">
  <button id="btnUndo">무르기</button>
  <button id="btnPass">한 수 쉬기</button>
  <button id="btnScoreReq" class="primary">계가</button>
  <button id="btnNew">새 대국</button>
</div>

<div class="controls hidden" id="fixControls">
  <button id="btnResume">계속 두기</button>
  <button id="btnScoreDone" class="primary">계가 완료</button>
</div>

<div class="toast" id="toast"></div>
<div id="resultOverlay" class="hidden"></div>

<script>
/* ============================================================
   9줄 바둑 v5
   변경점: 죽은 돌 자동 판정을 몬테카를로 방식으로 교체.

   원리:
   지금 판에서 양쪽이 무작위로(단, 자기 눈은 채우지 않고)
   수백 판을 끝까지 마저 둬본다. 죽은 돌은 그 과정에서
   거의 항상 잡혀 나가고, 두 눈을 가진 돌은 거의 항상
   살아남는다. 각 그룹의 '생존율'을 계산해서 50% 미만이면
   죽은 돌로 판정한다. 초창기 바둑 AI들이 실제로 쓰던
   계가 방법이다.
   ============================================================ */

const SIZE = 9;
const MARGIN = 38;
const SPACING_X = 48;
const SPACING_Y = 52;
const KOMI = 6.5;
const PLAYOUTS = 300;     // 무작위 마무리 판 수 (판정 정확도와 속도의 균형)
const EMPTY = 0, BLACK = 1, WHITE = 2;

const svg = document.getElementById('board');
const NS = 'http://www.w3.org/2000/svg';

let board, turn, captures, history, positions, passCount, lastMove;
let gameOver;
let fixing;
let deadStones;
let territoryMarks;

function px(i) { return MARGIN + i * SPACING_X; }
function py(i) { return MARGIN + i * SPACING_Y; }

// ---------- 판 그리기 (한 번만) ----------
function drawBoardBase() {
  const defs = document.createElementNS(NS, 'defs');
  defs.innerHTML = `
    <radialGradient id="wood" cx="50%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#e6bd70"/>
      <stop offset="70%" stop-color="#dcaf5e"/>
      <stop offset="100%" stop-color="#c99a4b"/>
    </radialGradient>
    <radialGradient id="gBlack" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="60%" stop-color="#1b1b1b"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="gWhite" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="75%" stop-color="#eeeade"/>
      <stop offset="100%" stop-color="#cfc9b8"/>
    </radialGradient>
    <filter id="stoneShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.6" flood-color="#000" flood-opacity="0.45"/>
    </filter>`;
  svg.appendChild(defs);

  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', 460);
  bg.setAttribute('height', 492);
  bg.setAttribute('fill', 'url(#wood)');
  svg.appendChild(bg);

  for (let i = 0; i < SIZE; i++) {
    const h = document.createElementNS(NS, 'line');
    h.setAttribute('x1', px(0)); h.setAttribute('y1', py(i));
    h.setAttribute('x2', px(SIZE - 1)); h.setAttribute('y2', py(i));
    h.setAttribute('stroke', 'var(--line)');
    h.setAttribute('stroke-width', i === 0 || i === SIZE - 1 ? 2 : 1);
    svg.appendChild(h);

    const v = document.createElementNS(NS, 'line');
    v.setAttribute('x1', px(i)); v.setAttribute('y1', py(0));
    v.setAttribute('x2', px(i)); v.setAttribute('y2', py(SIZE - 1));
    v.setAttribute('stroke', 'var(--line)');
    v.setAttribute('stroke-width', i === 0 || i === SIZE - 1 ? 2 : 1);
    svg.appendChild(v);
  }

  const stars = [[2,2],[2,6],[6,2],[6,6],[4,4]];
  for (const [x, y] of stars) {
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', px(x)); c.setAttribute('cy', py(y));
    c.setAttribute('r', 3.5);
    c.setAttribute('fill', 'var(--line)');
    svg.appendChild(c);
  }

  const g = document.createElementNS(NS, 'g');
  g.id = 'stones';
  svg.appendChild(g);

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const t = document.createElementNS(NS, 'circle');
      t.setAttribute('cx', px(x)); t.setAttribute('cy', py(y));
      t.setAttribute('r', SPACING_X / 2);
      t.setAttribute('fill', 'transparent');
      t.style.cursor = 'pointer';
      t.addEventListener('pointerdown', () => onTap(x, y));
      svg.appendChild(t);
    }
  }
}

function onTap(x, y) {
  if (fixing) toggleDead(x, y);
  else tryMove(x, y);
}

// ---------- 돌/집 그리기 ----------
function renderStones() {
  const g = document.getElementById('stones');
  g.innerHTML = '';

  for (const m of territoryMarks) {
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', px(m.x) - 7); r.setAttribute('y', py(m.y) - 7);
    r.setAttribute('width', 14); r.setAttribute('height', 14);
    r.setAttribute('rx', 3);
    r.setAttribute('fill', m.color === BLACK ? '#1b1b1b' : '#f2f0ea');
    r.setAttribute('opacity', 0.8);
    g.appendChild(r);
  }

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (board[y][x] === EMPTY) continue;
      const s = document.createElementNS(NS, 'circle');
      s.setAttribute('cx', px(x)); s.setAttribute('cy', py(y));
      s.setAttribute('r', 21);
      s.setAttribute('fill', board[y][x] === BLACK ? 'url(#gBlack)' : 'url(#gWhite)');
      s.setAttribute('filter', 'url(#stoneShadow)');
      s.classList.add('stone');
      if (deadStones.has(x + ',' + y)) s.classList.add('dead');
      g.appendChild(s);

      if (!fixing && lastMove && lastMove.x === x && lastMove.y === y) {
        const m = document.createElementNS(NS, 'circle');
        m.setAttribute('cx', px(x)); m.setAttribute('cy', py(y));
        m.setAttribute('r', 5.5);
        m.setAttribute('fill', 'var(--accent)');
        g.appendChild(m);
      }
    }
  }
  updateStatus();
}

function updateStatus() {
  document.getElementById('capBlack').textContent = captures[BLACK];
  document.getElementById('capWhite').textContent = captures[WHITE];
  document.getElementById('pBlack').classList.toggle('turn', !gameOver && turn === BLACK);
  document.getElementById('pWhite').classList.toggle('turn', !gameOver && turn === WHITE);
  const label = document.getElementById('turnLabel');
  if (fixing) label.innerHTML = '잘못 판정된 돌을 탭하세요';
  else if (gameOver) label.innerHTML = '대국 종료';
  else label.innerHTML = `<b>${turn === BLACK ? '흑' : '백'}</b> 차례`;

  document.getElementById('playControls').classList.toggle('hidden', fixing);
  document.getElementById('fixControls').classList.toggle('hidden', !fixing);
}

// ---------- 그룹과 활로 ----------
function getGroup(x, y, b = board) {
  const color = b[y][x];
  const stones = [];
  const liberties = new Set();
  const visited = new Set();
  const stack = [[x, y]];

  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = cx + ',' + cy;
    if (visited.has(key)) continue;
    visited.add(key);
    stones.push([cx, cy]);

    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
      if (b[ny][nx] === EMPTY) liberties.add(nx + ',' + ny);
      else if (b[ny][nx] === color) stack.push([nx, ny]);
    }
  }
  return { stones, liberties: liberties.size };
}

function boardString(b) { return b.map(row => row.join('')).join(''); }

// ---------- 착수 ----------
function tryMove(x, y) {
  if (gameOver) { showToast('대국이 끝났습니다. 새 대국을 눌러주세요'); return; }
  if (board[y][x] !== EMPTY) return;

  const backup = board.map(row => row.slice());
  board[y][x] = turn;

  const enemy = turn === BLACK ? WHITE : BLACK;
  let capturedCount = 0;
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
    if (board[ny][nx] !== enemy) continue;
    const grp = getGroup(nx, ny);
    if (grp.liberties === 0) {
      for (const [sx, sy] of grp.stones) { board[sy][sx] = EMPTY; capturedCount++; }
    }
  }

  if (getGroup(x, y).liberties === 0) {
    board = backup;
    showToast('둘 수 없는 자리입니다 (자살수)');
    return;
  }

  const newStr = boardString(board);
  if (positions.length >= 2 && newStr === positions[positions.length - 2]) {
    board = backup;
    showToast('패입니다. 다른 곳에 한 수 두세요');
    return;
  }

  history.push({
    board: backup,
    turn, captures: { ...captures },
    lastMove, passCount,
    positions: positions.slice()
  });
  captures[turn] += capturedCount;
  positions.push(newStr);
  lastMove = { x, y };
  passCount = 0;
  turn = enemy;
  playStoneSound(capturedCount > 0);
  renderStones();
}

// ---------- 한 수 쉬기 ----------
function pass() {
  if (gameOver) return;
  history.push({
    board: board.map(r => r.slice()),
    turn, captures: { ...captures },
    lastMove, passCount,
    positions: positions.slice()
  });
  passCount++;
  positions.push(boardString(board));
  lastMove = null;
  turn = turn === BLACK ? WHITE : BLACK;

  if (passCount >= 2) {
    requestScoring();
  } else {
    playPassSound();
    showToast(`${turn === BLACK ? '백' : '흑'}이 한 수 쉬었습니다`);
    renderStones();
  }
}

// ---------- 계가 요청 ----------
function requestScoring() {
  if (board.flat().every(v => v === EMPTY)) { showToast('아직 둔 수가 없습니다'); return; }
  gameOver = true;
  showToast('죽은 돌을 판정하는 중...', 3000);
  // 토스트가 화면에 먼저 그려지도록 잠깐 양보한 뒤 계산 시작
  setTimeout(() => {
    autoDetectDead();
    calculateScore();
  }, 50);
}

/* ============================================================
   몬테카를로 죽은 돌 판정
   ============================================================ */

// 빠른 그룹+활로 탐색 (판정 전용, 숫자 키 사용)
function getGroupFast(b, x, y) {
  const color = b[y][x];
  const stones = [];
  const libs = new Set();
  const visited = new Set();
  const stack = [[x, y]];
  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = cx * 16 + cy;
    if (visited.has(key)) continue;
    visited.add(key);
    stones.push([cx, cy]);
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
      if (b[ny][nx] === EMPTY) libs.add(nx * 16 + ny);
      else if (b[ny][nx] === color) stack.push([nx, ny]);
    }
  }
  return { stones, libs: libs.size };
}

// 내 눈(자기 집 한 칸) 판정 — 무작위 대국에서 눈은 채우지 않음
function isOwnEye(b, x, y, color) {
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
    if (b[ny][nx] !== color) return false;
  }
  let enemyDiag = 0, offBoard = 0;
  for (const [dx, dy] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) { offBoard++; continue; }
    const c = b[ny][nx];
    if (c !== EMPTY && c !== color) enemyDiag++;
  }
  if (offBoard > 0) return enemyDiag === 0;
  return enemyDiag <= 1;
}

// 착수 시도: 합법이면 보드를 수정하고 정보 반환, 불법이면 null
function tryPlayFast(b, x, y, color, ko) {
  if (b[y][x] !== EMPTY) return null;
  if (ko && ko[0] === x && ko[1] === y) return null;

  b[y][x] = color;
  const enemy = color === BLACK ? WHITE : BLACK;
  const captured = [];
  for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
    if (b[ny][nx] !== enemy) continue;
    const g = getGroupFast(b, nx, ny);
    if (g.libs === 0) {
      for (const [sx, sy] of g.stones) { b[sy][sx] = EMPTY; captured.push([sx, sy]); }
    }
  }
  const own = getGroupFast(b, x, y);
  if (own.libs === 0) {
    b[y][x] = EMPTY;
    for (const [sx, sy] of captured) b[sy][sx] = enemy;
    return null;
  }
  let newKo = null;
  if (captured.length === 1 && own.stones.length === 1 && own.libs === 1) {
    newKo = captured[0];   // 단패 자리 — 상대는 바로 되따내지 못함
  }
  return { ko: newKo };
}

// 무작위 마무리 한 판: 눈 채우기 금지, 합법수 없으면 쉼, 두 번 쉬면 종료
function playout(startBoard, startTurn) {
  const b = startBoard.map(r => r.slice());
  let t = startTurn;
  let ko = null;
  let passes = 0, moves = 0;
  const empties = [];

  while (passes < 2 && moves < 220) {
    empties.length = 0;
    for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
      if (b[y][x] === EMPTY) empties.push([x, y]);
    }
    let played = false;
    for (let i = empties.length - 1; i >= 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [empties[i], empties[j]] = [empties[j], empties[i]];
      const [x, y] = empties[i];
      if (isOwnEye(b, x, y, t)) continue;
      const res = tryPlayFast(b, x, y, t, ko);
      if (res) { ko = res.ko; played = true; break; }
    }
    if (played) { passes = 0; moves++; }
    else { passes++; ko = null; }
    t = t === BLACK ? WHITE : BLACK;
  }
  return b;
}

// 무작위 대국 수백 판의 최종 소유권 통계로 각 그룹의 생존율 계산
function autoDetectDead() {
  // 각 지점이 흑 소유로 끝난 횟수
  const own = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));

  for (let p = 0; p < PLAYOUTS; p++) {
    const fin = playout(board, turn);
    const visited = new Set();
    for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
      if (fin[y][x] === BLACK) own[y][x]++;
      else if (fin[y][x] === EMPTY && !visited.has(x * 16 + y)) {
        const region = [];
        const borders = new Set();
        const stack = [[x, y]];
        while (stack.length) {
          const [cx, cy] = stack.pop();
          const key = cx * 16 + cy;
          if (visited.has(key)) continue;
          visited.add(key);
          region.push([cx, cy]);
          for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
            const nx = cx + dx, ny = cy + dy;
            if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
            if (fin[ny][nx] === EMPTY) stack.push([nx, ny]);
            else borders.add(fin[ny][nx]);
          }
        }
        if (borders.size === 1 && borders.has(BLACK)) {
          for (const [rx, ry] of region) own[ry][rx]++;
        }
      }
    }
  }

  // 그룹별 생존율: 자기 자리가 자기 색 소유로 끝난 비율
  deadStones = new Set();
  const seen = new Set();
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    if (board[y][x] === EMPTY || seen.has(x + ',' + y)) continue;
    const grp = getGroup(x, y);
    let sum = 0;
    for (const [sx, sy] of grp.stones) {
      seen.add(sx + ',' + sy);
      sum += own[sy][sx] / PLAYOUTS;
    }
    const blackRate = sum / grp.stones.length;
    const color = board[y][x];
    const survivalRate = color === BLACK ? blackRate : 1 - blackRate;
    if (survivalRate < 0.5) {
      for (const [sx, sy] of grp.stones) deadStones.add(sx + ',' + sy);
    }
  }
}

// ---------- 집 계산 ----------
function calculateScore() {
  const work = board.map(r => r.slice());
  let deadBlack = 0, deadWhite = 0;
  for (const key of deadStones) {
    const [x, y] = key.split(',').map(Number);
    if (work[y][x] === BLACK) deadBlack++;
    if (work[y][x] === WHITE) deadWhite++;
    work[y][x] = EMPTY;
  }

  const visited = new Set();
  let terrBlack = 0, terrWhite = 0;
  territoryMarks = [];

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (work[y][x] !== EMPTY || visited.has(x + ',' + y)) continue;

      const region = [];
      const borders = new Set();
      const stack = [[x, y]];
      while (stack.length) {
        const [cx, cy] = stack.pop();
        const key = cx + ',' + cy;
        if (visited.has(key)) continue;
        visited.add(key);
        region.push([cx, cy]);
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
          if (work[ny][nx] === EMPTY) stack.push([nx, ny]);
          else borders.add(work[ny][nx]);
        }
      }

      if (borders.size === 1) {
        const owner = borders.has(BLACK) ? BLACK : WHITE;
        if (owner === BLACK) terrBlack += region.length;
        else terrWhite += region.length;
        for (const [rx, ry] of region) territoryMarks.push({ x: rx, y: ry, color: owner });
      }
    }
  }

  const scoreBlack = terrBlack + captures[BLACK] + deadWhite;
  const scoreWhite = terrWhite + captures[WHITE] + deadBlack + KOMI;

  fixing = false;
  renderStones();
  showResult({ scoreBlack, scoreWhite, terrBlack, terrWhite,
               capBlack: captures[BLACK] + deadWhite,
               capWhite: captures[WHITE] + deadBlack });
}

// ---------- 결과 카드 ----------
function showResult(r) {
  const diff = Math.abs(r.scoreBlack - r.scoreWhite);
  const winner = r.scoreBlack > r.scoreWhite ? '흑' : '백';
  const overlay = document.getElementById('resultOverlay');
  overlay.className = 'result-overlay';
  overlay.innerHTML = `
    <div class="result-card">
      <h2><span>${winner}</span> ${diff}집 승</h2>
      <div class="detail">
        흑: 집 <b>${r.terrBlack}</b> + 사석 <b>${r.capBlack}</b> = <b>${r.scoreBlack}</b>집<br>
        백: 집 <b>${r.terrWhite}</b> + 사석 <b>${r.capWhite}</b> + 덤 <b>${KOMI}</b> = <b>${r.scoreWhite}</b>집
      </div>
      <div class="btns">
        <button id="btnFix">판정 수정</button>
        <button id="btnBack">계속 두기</button>
        <button id="btnNewFromResult" class="primary">새 대국</button>
      </div>
    </div>`;
  document.getElementById('btnFix').addEventListener('click', () => {
    closeResult();
    fixing = true;
    showToast('잘못 판정된 돌을 탭해서 고친 뒤 [계가 완료]를 누르세요', 3000);
    renderStones();
  });
  document.getElementById('btnBack').addEventListener('click', () => {
    closeResult();
    resumePlay();
  });
  document.getElementById('btnNewFromResult').addEventListener('click', () => {
    closeResult();
    newGame();
  });
}

function closeResult() {
  const overlay = document.getElementById('resultOverlay');
  overlay.className = 'hidden';
  overlay.innerHTML = '';
}

// ---------- 판정 수정 ----------
function toggleDead(x, y) {
  if (board[y][x] === EMPTY) return;
  const grp = getGroup(x, y);
  const nowDead = !deadStones.has(x + ',' + y);
  for (const [sx, sy] of grp.stones) {
    const key = sx + ',' + sy;
    if (nowDead) deadStones.add(key);
    else deadStones.delete(key);
  }
  territoryMarks = [];
  renderStones();
}

// ---------- 계속 두기 ----------
function resumePlay() {
  fixing = false;
  gameOver = false;
  passCount = 0;
  deadStones = new Set();
  territoryMarks = [];
  showToast('대국을 계속합니다');
  renderStones();
}

// ---------- 무르기 ----------
function undo() {
  if (!history.length) { showToast('무를 수가 없습니다'); return; }
  const prev = history.pop();
  board = prev.board;
  turn = prev.turn;
  captures = prev.captures;
  lastMove = prev.lastMove;
  passCount = prev.passCount;
  positions = prev.positions;
  gameOver = false;
  fixing = false;
  deadStones = new Set();
  territoryMarks = [];
  renderStones();
}

// ---------- 새 대국 ----------
function newGame() {
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
  turn = BLACK;
  captures = { [BLACK]: 0, [WHITE]: 0 };
  history = [];
  positions = [boardString(board)];
  passCount = 0;
  gameOver = false;
  fixing = false;
  lastMove = null;
  deadStones = new Set();
  territoryMarks = [];
  renderStones();
}

// ---------- 안내 메시지 ----------
let toastTimer;
function showToast(msg, duration = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

let audioCtx = null;
let stoneBuffers = [];
let captureBuffers = [];
let passBuffer = null;

function decodeB64(b64str, onDone) {
  const bin = atob(b64str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  audioCtx.decodeAudioData(bytes.buffer, onDone, () => {});
}

function initSound() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    for (const s of STONE_B64) decodeB64(s, buf => stoneBuffers.push(buf));
    for (const s of CAPTURE_B64) decodeB64(s, buf => captureBuffers.push(buf));
    decodeB64(PASS_B64, buf => { passBuffer = buf; });
  } catch (e) { audioCtx = null; }
}

function playBuffer(buf, gainVal) {
  if (!audioCtx || !buf) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.value = gainVal;
  src.connect(g).connect(audioCtx.destination);
  src.start();
}

// captured=true면 따내는 소리, 아니면 착수음
function playStoneSound(captured = false) {
  try {
    initSound();
    if (captured && captureBuffers.length) {
      playBuffer(captureBuffers[Math.floor(Math.random() * captureBuffers.length)], 0.9);
    } else if (stoneBuffers.length) {
      playBuffer(stoneBuffers[Math.floor(Math.random() * stoneBuffers.length)], 0.9);
    }
  } catch (e) { /* 소리 실패해도 게임은 계속 */ }
}

function playPassSound() {
  try {
    initSound();
    playBuffer(passBuffer, 0.8);
  } catch (e) { /* */ }
}

// 모바일 브라우저는 첫 터치 후에만 소리를 허용하므로 미리 준비
document.addEventListener('pointerdown', initSound, { once: true });

// ---------- 시작 ----------
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnPass').addEventListener('click', pass);
document.getElementById('btnScoreReq').addEventListener('click', requestScoring);
document.getElementById('btnNew').addEventListener('click', () => {
  if (confirm('새 대국을 시작할까요? 지금 판은 사라집니다.')) newGame();
});
document.getElementById('btnResume').addEventListener('click', resumePlay);
document.getElementById('btnScoreDone').addEventListener('click', calculateScore);

drawBoardBase();
newGame();
</script>
</body>
